services:
  - type: web
    name: circuitron-api
    runtime: python
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn test.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: LIGHTNING_AI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://your-app.vercel.app"
    plan: starter
